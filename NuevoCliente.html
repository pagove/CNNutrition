<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width-scale=1">
    <link rel="stylesheet" href="estilos.css">
    <title>&nbsp;</title>
</head>

<body>
    <div class="container marginTop30">
        <form class="row g-3">
            <div class="col-md-4">
                <label for="validationDefault01" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="validationDefault01" placeholder="Mark" required>
            </div>
            <div class="col-md-4">
                <label for="validationDefault02" class="form-label">Primer Apellido</label>
                <input type="text" class="form-control" id="validationDefault02" placeholder="Otto" required>
            </div>
            <div class="col-md-4">
                <label for="validationDefault02" class="form-label">Segundo Apellido</label>
                <input type="text" class="form-control" id="validationDefault02" placeholder="Otto" required>
            </div>
            
            <div class="col-md-6">
                <label for="validationDefaultUsername" class="form-label">Correo electrónico</label>
                <div class="input-group">
                    <input type="text" class="form-control" id="validationDefaultUsername"  aria-describedby="inputGroupPrepend2" required>
                    <span class="input-group-text" id="inputGroupPrepend2">@</span>
                    <select class="form-select" aria-label="Default select example">
                      <option selected>gmail.com</option>
                      <option value="1">gmail.es</option>
                      <option value="2">hotmail.com</option>
                      <option value="3">hotmail.es</option>
                    </select>
                </div>
            </div>
            <div class="col-md-4">
                <label for="validationDefault03" class="form-label">Móvil</label>
                <input type="number" class="form-control" id="validationDefault03" required>
            </div>
            <div class="col-md-4">
                <label for="validationDefault04" class="form-label">Sexo</label>
                <select class="form-select" id="validationDefault04" required>
                    <option selected >Hombre</option>
                    <option>Mujer</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="validationDefault05" class="form-label">Altura (m)</label>
                <input type="number" step="0.01" value="1.50" class="form-control" id="validationDefault05" required>
            </div>
            <div class="col-md-4">
                <label for="validationDefault04" class="form-label">Plan dietético</label>
                <select class="form-select" id="validationDefault04" required>
                    <option selected >Básico</option>
                    <option>Avanzado</option>
                </select>
            </div>
            <div class="col-md-6">
                <label for="floatingTextarea2">Patologías/Intoleráncias</label>
                <textarea class="form-control" id="floatingTextarea2" style="height: 100px"></textarea>
            </div>
            <div class="col-md-6">
                <label for="floatingTextarea2">Grupos de alimentos con aversión </label>
                <textarea class="form-control" id="floatingTextarea2" style="height: 100px"></textarea>
            </div>
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="invalidCheck2" required>
                    <label class="form-check-label" for="invalidCheck2">
                        Estoy de acuerdo con los términos y las condiciones	
                    </label>
                </div>
            </div>
            <div class="col-12">
                <button type="button" class="btn btn-outline-dark marginLeft20">Guardar</button>
            </div>
        </form>
    </div>
</body>

</html>
